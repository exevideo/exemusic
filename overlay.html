<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Tracker Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   BASE — transparent background for OBS capture
══════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════════
   THEME SYSTEM — CSS custom properties per theme
══════════════════════════════════════════════════ */

/* ── 1. DARK GOLD (default) ── */
[data-theme="dark"] {
  --bg:        rgba(6,8,16,0.92);
  --bg2:       rgba(14,18,32,0.95);
  --border:    rgba(232,171,42,0.25);
  --border2:   rgba(232,171,42,0.12);
  --accent:    #e8ab2a;
  --accent2:   #c4880a;
  --win:       #0ec47a;
  --lose:      #e84040;
  --text1:     #f0f4f8;
  --text2:     #8fa0b8;
  --text3:     #445568;
  --glow:      0 0 24px rgba(232,171,42,0.35), 0 0 60px rgba(232,171,42,0.1);
  --glow-win:  0 0 14px rgba(14,196,122,0.5);
  --glow-lose: 0 0 14px rgba(232,64,64,0.5);
  --separator: rgba(255,255,255,0.06);
  --ff-num:    'Space Mono', monospace;
  --ff-lbl:    'Syne', sans-serif;
}

/* ── 2. NEON CYAN ── */
[data-theme="neon"] {
  --bg:        rgba(0,8,20,0.95);
  --bg2:       rgba(0,15,30,0.97);
  --border:    rgba(0,255,220,0.3);
  --border2:   rgba(0,255,220,0.1);
  --accent:    #00ffdc;
  --accent2:   #00b8a0;
  --win:       #00ffdc;
  --lose:      #ff3860;
  --text1:     #e0f8ff;
  --text2:     #5ab8cc;
  --text3:     #2a5566;
  --glow:      0 0 20px rgba(0,255,220,0.4), 0 0 50px rgba(0,255,220,0.12);
  --glow-win:  0 0 16px rgba(0,255,220,0.6);
  --glow-lose: 0 0 16px rgba(255,56,96,0.6);
  --separator: rgba(0,255,220,0.08);
  --ff-num:    'Orbitron', monospace;
  --ff-lbl:    'Rajdhani', sans-serif;
}

/* ── 3. BLOOD RED ── */
[data-theme="red"] {
  --bg:        rgba(12,4,4,0.95);
  --bg2:       rgba(20,6,6,0.97);
  --border:    rgba(220,40,40,0.35);
  --border2:   rgba(220,40,40,0.15);
  --accent:    #e83232;
  --accent2:   #a01010;
  --win:       #ff6b35;
  --lose:      #e83232;
  --text1:     #fff0f0;
  --text2:     #c88080;
  --text3:     #664040;
  --glow:      0 0 24px rgba(220,40,40,0.45), 0 0 60px rgba(220,40,40,0.12);
  --glow-win:  0 0 14px rgba(255,107,53,0.55);
  --glow-lose: 0 0 14px rgba(232,50,50,0.6);
  --separator: rgba(220,40,40,0.1);
  --ff-num:    'Orbitron', monospace;
  --ff-lbl:    'Syne', sans-serif;
}

/* ── 4. ROYAL PURPLE ── */
[data-theme="purple"] {
  --bg:        rgba(8,5,18,0.95);
  --bg2:       rgba(14,8,28,0.97);
  --border:    rgba(140,80,255,0.3);
  --border2:   rgba(140,80,255,0.12);
  --accent:    #9d60ff;
  --accent2:   #6830cc;
  --win:       #a0ff80;
  --lose:      #ff60a0;
  --text1:     #f0e8ff;
  --text2:     #9878cc;
  --text3:     #4a3066;
  --glow:      0 0 24px rgba(140,80,255,0.4), 0 0 60px rgba(140,80,255,0.1);
  --glow-win:  0 0 14px rgba(160,255,128,0.5);
  --glow-lose: 0 0 14px rgba(255,96,160,0.5);
  --separator: rgba(140,80,255,0.1);
  --ff-num:    'Space Mono', monospace;
  --ff-lbl:    'Syne', sans-serif;
}

/* ── 5. MINIMAL GLASS ── */
[data-theme="minimal"] {
  --bg:        rgba(255,255,255,0.07);
  --bg2:       rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.18);
  --border2:   rgba(255,255,255,0.08);
  --accent:    #ffffff;
  --accent2:   rgba(255,255,255,0.7);
  --win:       #4ade80;
  --lose:      #f87171;
  --text1:     #ffffff;
  --text2:     rgba(255,255,255,0.6);
  --text3:     rgba(255,255,255,0.3);
  --glow:      0 4px 24px rgba(255,255,255,0.08);
  --glow-win:  0 0 12px rgba(74,222,128,0.5);
  --glow-lose: 0 0 12px rgba(248,113,113,0.5);
  --separator: rgba(255,255,255,0.1);
  --ff-num:    'DM Sans', sans-serif;
  --ff-lbl:    'DM Sans', sans-serif;
}

/* ── 6. MIDNIGHT BLUE ── */
[data-theme="darkblue"] {
  --bg:        rgba(4,10,28,0.95);
  --bg2:       rgba(6,14,38,0.97);
  --border:    rgba(56,130,255,0.28);
  --border2:   rgba(56,130,255,0.1);
  --accent:    #4488ff;
  --accent2:   #1a55cc;
  --win:       #22e8a8;
  --lose:      #ff5060;
  --text1:     #e8f0ff;
  --text2:     #6888c0;
  --text3:     #2a3a60;
  --glow:      0 0 24px rgba(56,130,255,0.4), 0 0 60px rgba(56,130,255,0.1);
  --glow-win:  0 0 14px rgba(34,232,168,0.5);
  --glow-lose: 0 0 14px rgba(255,80,96,0.5);
  --separator: rgba(56,130,255,0.08);
  --ff-num:    'Orbitron', monospace;
  --ff-lbl:    'Rajdhani', sans-serif;
}

/* ── 7. FOREST / MILITARY ── */
[data-theme="forest"] {
  --bg:        rgba(4,12,8,0.95);
  --bg2:       rgba(6,18,10,0.97);
  --border:    rgba(80,180,80,0.28);
  --border2:   rgba(80,180,80,0.1);
  --accent:    #50c850;
  --accent2:   #2a7a2a;
  --win:       #78e878;
  --lose:      #e85050;
  --text1:     #e8ffe8;
  --text2:     #70a870;
  --text3:     #2a4a2a;
  --glow:      0 0 22px rgba(80,180,80,0.4), 0 0 55px rgba(80,180,80,0.1);
  --glow-win:  0 0 14px rgba(120,232,120,0.5);
  --glow-lose: 0 0 14px rgba(232,80,80,0.5);
  --separator: rgba(80,180,80,0.08);
  --ff-num:    'Rajdhani', sans-serif;
  --ff-lbl:    'Rajdhani', sans-serif;
}

/* ── 8. SUNSET ORANGE ── */
[data-theme="sunset"] {
  --bg:        rgba(16,6,2,0.95);
  --bg2:       rgba(24,8,2,0.97);
  --border:    rgba(255,120,40,0.3);
  --border2:   rgba(255,120,40,0.12);
  --accent:    #ff7828;
  --accent2:   #cc4c00;
  --win:       #ffcc44;
  --lose:      #ff4060;
  --text1:     #fff4e8;
  --text2:     #cc8860;
  --text3:     #664030;
  --glow:      0 0 24px rgba(255,120,40,0.4), 0 0 60px rgba(255,120,40,0.12);
  --glow-win:  0 0 14px rgba(255,204,68,0.5);
  --glow-lose: 0 0 14px rgba(255,64,96,0.5);
  --separator: rgba(255,120,40,0.1);
  --ff-num:    'Space Mono', monospace;
  --ff-lbl:    'Syne', sans-serif;
}

/* ══════════════════════════════════════════════════
   SIZE CONTAINERS
══════════════════════════════════════════════════ */
.overlay-root {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}

/* ── BANNER (1920×120) ── */
[data-size="banner"] .overlay-root { align-items: center; }
[data-size="banner"] .card {
  width: 1920px; height: 120px;
  display: flex; align-items: center;
}

/* ── SIDEBAR (300×500) ── */
[data-size="sidebar"] .overlay-root { align-items: flex-start; justify-content: flex-start; }
[data-size="sidebar"] .card {
  width: 300px;
  display: flex; flex-direction: column;
}

/* ── WIDGET (400×280) ── */
[data-size="widget"] .overlay-root { }
[data-size="widget"] .card {
  width: 400px;
  display: flex; flex-direction: column;
}

/* ── COMPACT (560×80) ── */
[data-size="compact"] .overlay-root { }
[data-size="compact"] .card {
  width: 560px; height: 80px;
  display: flex; align-items: center;
}

/* ══════════════════════════════════════════════════
   CARD BASE STYLES
══════════════════════════════════════════════════ */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  animation: card-in 0.6s cubic-bezier(0.16,1,0.3,1) both;
}

/* Glass sheen on top */
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--border) 30%, var(--accent) 50%, var(--border) 70%, transparent 100%);
  opacity: 0.6;
  z-index: 10;
}

/* Ambient glow */
.card::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,255,255,0.03), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

@keyframes card-in {
  from { opacity:0; transform: translateY(8px) scale(0.98); }
  to   { opacity:1; transform: translateY(0)   scale(1); }
}

/* ══════════════════════════════════════════════════
   STAT BLOCK — reusable unit
══════════════════════════════════════════════════ */
.stat {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; z-index: 1;
  flex: 1;
}

.stat-val {
  font-family: var(--ff-num);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.5px;
  transition: all 0.3s ease;
}

.stat-lbl {
  font-family: var(--ff-lbl);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-top: 3px;
}

/* Updated number animation */
.stat-val.bump {
  animation: num-bump 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes num-bump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}

/* Separator line */
.sep {
  width: 1px;
  background: var(--separator);
  align-self: stretch;
  flex-shrink: 0;
  margin: 0 4px;
}

/* ══════════════════════════════════════════════════
   WIN RATE BAR
══════════════════════════════════════════════════ */
.wr-track {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
.wr-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--win), color-mix(in srgb, var(--win) 60%, var(--accent)));
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.wr-fill::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
  border-radius: 99px;
}

/* ══════════════════════════════════════════════════
   USERNAME / BRAND
══════════════════════════════════════════════════ */
.brand-area {
  display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 1;
}
.brand-name {
  font-family: var(--ff-lbl);
  font-weight: 800;
  color: var(--text1);
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-sub {
  font-family: var(--ff-lbl);
  color: var(--text3);
  white-space: nowrap;
}
.brand-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: dot-pulse 2s infinite;
  flex-shrink: 0;
}
@keyframes dot-pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* LIVE indicator */
.live-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--ff-lbl); font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--accent);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 99px;
  padding: 2px 8px;
}

/* MMR change badge */
.mmr-badge {
  display: inline-flex; align-items: center;
  font-family: var(--ff-lbl); font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; letter-spacing: 0.5px;
  transition: all 0.3s ease;
}
.mmr-badge.pos { background: rgba(14,196,122,0.15); color: var(--win); border: 1px solid rgba(14,196,122,0.25); }
.mmr-badge.neg { background: rgba(232,64,64,0.15);  color: var(--lose); border: 1px solid rgba(232,64,64,0.25); }
.mmr-badge.neu { background: rgba(255,255,255,0.05); color: var(--text3); border: 1px solid var(--separator); }

/* ══════════════════════════════════════════════════
   ── BANNER LAYOUT ──
══════════════════════════════════════════════════ */
[data-size="banner"] .card-inner {
  display: flex; align-items: center; width: 100%; height: 100%;
  padding: 0 32px; gap: 0;
  position: relative; z-index: 1;
}
[data-size="banner"] .brand-area {
  min-width: 220px; max-width: 260px; padding-right: 28px;
}
[data-size="banner"] .brand-name { font-size: 22px; }
[data-size="banner"] .brand-sub  { font-size: 11px; margin-top: 2px; }
[data-size="banner"] .stat { padding: 0 24px; }
[data-size="banner"] .stat-val  { font-size: 44px; }
[data-size="banner"] .stat-lbl  { font-size: 9px; margin-top: 4px; }
[data-size="banner"] .sep { height: 52px; margin: 0; }
[data-size="banner"] .wr-section { padding: 0 24px; flex: 1.2; }
[data-size="banner"] .wr-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
[data-size="banner"] .wr-label { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="banner"] .wr-val   { font-family: var(--ff-num); font-size: 20px; font-weight: 700; }
[data-size="banner"] .wr-track { height: 5px; }
[data-size="banner"] .mmr-section { padding: 0 28px 0 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 140px; }
[data-size="banner"] .mmr-val { font-family: var(--ff-num); font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; text-shadow: var(--glow); }
[data-size="banner"] .mmr-lbl { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }

/* ══════════════════════════════════════════════════
   ── WIDGET LAYOUT (400×auto) ──
══════════════════════════════════════════════════ */
[data-size="widget"] .card-inner {
  display: flex; flex-direction: column;
  padding: 20px; gap: 14px;
  position: relative; z-index: 1;
}
[data-size="widget"] .widget-top {
  display: flex; align-items: center; justify-content: space-between;
}
[data-size="widget"] .brand-name { font-size: 18px; }
[data-size="widget"] .brand-sub  { font-size: 10px; margin-top: 2px; }
[data-size="widget"] .stats-row {
  display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; gap: 0;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
}
[data-size="widget"] .stat { padding: 14px 10px; }
[data-size="widget"] .stat-val  { font-size: 34px; }
[data-size="widget"] .stat-lbl  { font-size: 8px; margin-top: 3px; }
[data-size="widget"] .sep { background: var(--border2); margin: 0; }
[data-size="widget"] .wr-section { }
[data-size="widget"] .wr-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
[data-size="widget"] .wr-label { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="widget"] .wr-val   { font-family: var(--ff-num); font-size: 16px; font-weight: 700; }
[data-size="widget"] .wr-track { height: 6px; }
[data-size="widget"] .mmr-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 16px;
}
[data-size="widget"] .mmr-left { display: flex; flex-direction: column; }
[data-size="widget"] .mmr-val { font-family: var(--ff-num); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; text-shadow: var(--glow); }
[data-size="widget"] .mmr-lbl { font-family: var(--ff-lbl); font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 2px; }

/* ══════════════════════════════════════════════════
   ── SIDEBAR LAYOUT (300×auto) ──
══════════════════════════════════════════════════ */
[data-size="sidebar"] .card-inner {
  display: flex; flex-direction: column;
  padding: 20px; gap: 12px;
  position: relative; z-index: 1;
}
[data-size="sidebar"] .sidebar-header {
  display: flex; flex-direction: column; gap: 8px;
  padding-bottom: 14px; border-bottom: 1px solid var(--separator);
}
[data-size="sidebar"] .brand-name { font-size: 20px; }
[data-size="sidebar"] .brand-sub  { font-size: 10px; margin-top: 2px; }
[data-size="sidebar"] .sidebar-header-bottom { display: flex; align-items: center; justify-content: space-between; }
[data-size="sidebar"] .mmr-big { font-family: var(--ff-num); font-size: 44px; font-weight: 700; color: var(--accent); line-height: 1; text-shadow: var(--glow); }
[data-size="sidebar"] .mmr-big-lbl { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="sidebar"] .wl-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
[data-size="sidebar"] .wl-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
[data-size="sidebar"] .wl-val { font-family: var(--ff-num); font-size: 36px; font-weight: 700; line-height: 1; }
[data-size="sidebar"] .wl-lbl { font-family: var(--ff-lbl); font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="sidebar"] .wr-section { }
[data-size="sidebar"] .wr-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
[data-size="sidebar"] .wr-label { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="sidebar"] .wr-val   { font-family: var(--ff-num); font-size: 18px; font-weight: 700; }
[data-size="sidebar"] .wr-track { height: 8px; }
[data-size="sidebar"] .sidebar-footer {
  padding-top: 12px; border-top: 1px solid var(--separator);
  display: flex; align-items: center; justify-content: space-between;
}
[data-size="sidebar"] .footer-brand { font-family: var(--ff-lbl); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }

/* ══════════════════════════════════════════════════
   ── COMPACT LAYOUT (560×80) ──
══════════════════════════════════════════════════ */
[data-size="compact"] .card { border-radius: 12px; }
[data-size="compact"] .card-inner {
  display: flex; align-items: center;
  width: 100%; height: 100%;
  padding: 0 20px; gap: 0;
  position: relative; z-index: 1;
}
[data-size="compact"] .brand-area { min-width: 140px; padding-right: 18px; }
[data-size="compact"] .brand-name { font-size: 15px; }
[data-size="compact"] .brand-sub  { font-size: 9px; margin-top: 1px; }
[data-size="compact"] .stat { padding: 0 16px; }
[data-size="compact"] .stat-val  { font-size: 28px; }
[data-size="compact"] .stat-lbl  { font-size: 8px; }
[data-size="compact"] .sep { height: 36px; margin: 0; }
[data-size="compact"] .wr-section { padding: 0 16px; flex: 1; }
[data-size="compact"] .wr-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
[data-size="compact"] .wr-label { font-family: var(--ff-lbl); font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
[data-size="compact"] .wr-val   { font-family: var(--ff-num); font-size: 14px; font-weight: 700; }
[data-size="compact"] .wr-track { height: 3px; }
[data-size="compact"] .mmr-section { padding: 0 0 0 16px; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 100px; }
[data-size="compact"] .mmr-val { font-family: var(--ff-num); font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1; text-shadow: var(--glow); }
[data-size="compact"] .mmr-lbl { font-family: var(--ff-lbl); font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }

/* ══════════════════════════════════════════════════
   WIN / LOSE / WR coloring
══════════════════════════════════════════════════ */
.win-val  { color: var(--win);  text-shadow: var(--glow-win); }
.lose-val { color: var(--lose); text-shadow: var(--glow-lose); }
.wr-good  { color: var(--win);  text-shadow: var(--glow-win); }
.wr-mid   { color: var(--accent); }
.wr-bad   { color: var(--lose); text-shadow: var(--glow-lose); }

/* ══════════════════════════════════════════════════
   LOADING STATE
══════════════════════════════════════════════════ */
.loading-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: ld 1s infinite;
}
.loading-dot:nth-child(2) { animation-delay: .15s; }
.loading-dot:nth-child(3) { animation-delay: .3s; }
@keyframes ld { 0%,80%,100%{transform:scale(.6);opacity:.3} 40%{transform:scale(1);opacity:1} }
.loading-dots { display: flex; gap: 6px; }

/* ERROR STATE */
.error-state {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1px; text-align: center;
}
</style>
</head>
<body>

<!-- Loading state -->
<div class="loading-overlay" id="loadingState">
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- Error state -->
<div class="error-state" id="errorState" style="display:none">
  UID tidak ditemukan
</div>

<!-- Main overlay — injected by JS -->
<div id="overlayRoot"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, onValue, get
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBZs-qSS8Zj7wLs_TdUyYb03xviy81ew_Y",
  authDomain: "winlose-mlbb.firebaseapp.com",
  projectId: "winlose-mlbb",
  storageBucket: "winlose-mlbb.firebasestorage.app",
  messagingSenderId: "584562860632",
  appId: "1:584562860632:web:b0b22c23a7871781c8202d",
  databaseURL: "https://winlose-mlbb-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

// ── Parse URL params ──
const params = new URLSearchParams(window.location.search);
const UID   = params.get('uid')   || '';
const SIZE  = params.get('size')  || 'widget';
const THEME = params.get('theme') || 'dark';

// Valid values guard
const VALID_SIZES  = ['banner','widget','sidebar','compact'];
const VALID_THEMES = ['dark','neon','red','purple','minimal','darkblue','forest','sunset'];
const size  = VALID_SIZES.includes(SIZE)   ? SIZE   : 'widget';
const theme = VALID_THEMES.includes(THEME) ? THEME : 'dark';

// ── State ──
let state = {
  username: '—',
  win: 0, lose: 0, mmr: null, mmrStart: null,
};
let rendered = false;

// ── Helpers ──
function wr(w, l) {
  const t = w + l;
  return t > 0 ? Math.round(w / t * 100) : 0;
}
function wrClass(pct) {
  return pct >= 60 ? 'wr-good' : pct >= 50 ? 'wr-mid' : 'wr-bad';
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function bump(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

// ── Build HTML per size ──
function buildOverlay() {
  const { username, win, lose, mmr, mmrStart } = state;
  const winRate = wr(win, lose);
  const wrPct   = winRate;
  const mmrVal  = mmr !== null ? mmr : '—';
  const delta   = (mmr !== null && mmrStart !== null) ? mmr - mmrStart : null;
  const deltaStr = delta === null ? '' : delta > 0 ? `+${delta}` : delta < 0 ? `${delta}` : '±0';
  const deltaCls = delta === null ? 'neu' : delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'neu';
  const wrCls = wrClass(wrPct);

  if (size === 'banner') return buildBanner({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls });
  if (size === 'sidebar') return buildSidebar({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls });
  if (size === 'compact') return buildCompact({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls });
  return buildWidget({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls });
}

function buildBanner({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls }) {
  return `
  <div class="overlay-root" data-size="banner" data-theme="${theme}">
    <div class="card">
      <div class="card-inner">
        <!-- Brand -->
        <div class="brand-area">
          <div class="brand-name" id="o-username">${esc(username)}</div>
          <div class="brand-sub">MLBB Tracker</div>
        </div>
        <div class="sep"></div>
        <!-- Win -->
        <div class="stat">
          <div class="stat-val win-val" id="o-win">${win}</div>
          <div class="stat-lbl">Win</div>
        </div>
        <div class="sep"></div>
        <!-- Lose -->
        <div class="stat">
          <div class="stat-val lose-val" id="o-lose">${lose}</div>
          <div class="stat-lbl">Lose</div>
        </div>
        <div class="sep"></div>
        <!-- WR -->
        <div class="wr-section">
          <div class="wr-label-row">
            <span class="wr-label">Win Rate</span>
            <span class="wr-val ${wrCls}" id="o-wr">${wrPct}%</span>
          </div>
          <div class="wr-track">
            <div class="wr-fill" id="o-wrbar" style="width:${wrPct}%"></div>
          </div>
        </div>
        <div class="sep"></div>
        <!-- MMR -->
        <div class="mmr-section">
          <div class="mmr-lbl">MMR</div>
          <div class="mmr-val" id="o-mmr">${mmrVal}</div>
          ${deltaStr ? `<div class="mmr-badge ${deltaCls}" id="o-delta">${deltaStr}</div>` : ''}
        </div>
        <!-- Live dot -->
        <div style="margin-left:16px;"><div class="brand-dot"></div></div>
      </div>
    </div>
  </div>`;
}

function buildWidget({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls }) {
  return `
  <div class="overlay-root" data-size="widget" data-theme="${theme}">
    <div class="card">
      <div class="card-inner">
        <!-- Top row -->
        <div class="widget-top">
          <div class="brand-area">
            <div class="brand-name" id="o-username">${esc(username)}</div>
            <div class="brand-sub">MLBB Tracker ID</div>
          </div>
          <div style="display:flex;align-items:center;gap:7px;">
            <div class="live-tag"><div class="brand-dot"></div>LIVE</div>
          </div>
        </div>
        <!-- Stats row -->
        <div class="stats-row">
          <div class="stat">
            <div class="stat-val win-val" id="o-win">${win}</div>
            <div class="stat-lbl">Win</div>
          </div>
          <div class="sep"></div>
          <div class="stat">
            <div class="stat-val lose-val" id="o-lose">${lose}</div>
            <div class="stat-lbl">Lose</div>
          </div>
          <div class="sep"></div>
          <div class="stat">
            <div class="stat-val ${wrCls}" id="o-wr">${wrPct}%</div>
            <div class="stat-lbl">Win Rate</div>
          </div>
        </div>
        <!-- WR Bar -->
        <div class="wr-section">
          <div class="wr-label-row">
            <span class="wr-label">Win Rate Progress</span>
            <span class="wr-val ${wrCls}">${wrPct}%</span>
          </div>
          <div class="wr-track">
            <div class="wr-fill" id="o-wrbar" style="width:${wrPct}%"></div>
          </div>
        </div>
        <!-- MMR Row -->
        <div class="mmr-row">
          <div class="mmr-left">
            <div class="mmr-lbl">MMR Sekarang</div>
            <div class="mmr-val" id="o-mmr">${mmrVal}</div>
          </div>
          ${deltaStr ? `<div class="mmr-badge ${deltaCls}" id="o-delta">${deltaStr} hari ini</div>` : '<div></div>'}
        </div>
      </div>
    </div>
  </div>`;
}

function buildSidebar({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls }) {
  return `
  <div class="overlay-root" data-size="sidebar" data-theme="${theme}">
    <div class="card">
      <div class="card-inner">
        <!-- Header -->
        <div class="sidebar-header">
          <div class="brand-area">
            <div class="brand-name" id="o-username">${esc(username)}</div>
            <div class="brand-sub">MLBB Tracker ID</div>
          </div>
          <div class="sidebar-header-bottom">
            <div>
              <div class="mmr-big-lbl">MMR</div>
              <div class="mmr-big" id="o-mmr">${mmrVal}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
              ${deltaStr ? `<div class="mmr-badge ${deltaCls}" id="o-delta">${deltaStr}</div>` : ''}
              <div class="live-tag"><div class="brand-dot"></div>LIVE</div>
            </div>
          </div>
        </div>
        <!-- W/L Cards -->
        <div class="wl-grid">
          <div class="wl-card">
            <div class="wl-val win-val" id="o-win">${win}</div>
            <div class="wl-lbl">Win</div>
          </div>
          <div class="wl-card">
            <div class="wl-val lose-val" id="o-lose">${lose}</div>
            <div class="wl-lbl">Lose</div>
          </div>
        </div>
        <!-- WR Bar -->
        <div class="wr-section">
          <div class="wr-label-row">
            <span class="wr-label">Win Rate</span>
            <span class="wr-val ${wrCls}" id="o-wr">${wrPct}%</span>
          </div>
          <div class="wr-track">
            <div class="wr-fill" id="o-wrbar" style="width:${wrPct}%"></div>
          </div>
        </div>
        <!-- Footer -->
        <div class="sidebar-footer">
          <span class="footer-brand">MLBB Tracker</span>
          <div class="brand-dot"></div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildCompact({ username, win, lose, mmrVal, deltaStr, deltaCls, wrPct, wrCls }) {
  return `
  <div class="overlay-root" data-size="compact" data-theme="${theme}">
    <div class="card">
      <div class="card-inner">
        <div class="brand-area">
          <div class="brand-name" id="o-username">${esc(username)}</div>
          <div class="brand-sub">MLBB Tracker</div>
        </div>
        <div class="sep"></div>
        <div class="stat">
          <div class="stat-val win-val" id="o-win">${win}</div>
          <div class="stat-lbl">Win</div>
        </div>
        <div class="sep"></div>
        <div class="stat">
          <div class="stat-val lose-val" id="o-lose">${lose}</div>
          <div class="stat-lbl">Lose</div>
        </div>
        <div class="sep"></div>
        <div class="wr-section">
          <div class="wr-label-row">
            <span class="wr-label">WR</span>
            <span class="wr-val ${wrCls}" id="o-wr">${wrPct}%</span>
          </div>
          <div class="wr-track">
            <div class="wr-fill" id="o-wrbar" style="width:${wrPct}%"></div>
          </div>
        </div>
        <div class="sep"></div>
        <div class="mmr-section">
          <div class="mmr-lbl">MMR</div>
          <div class="mmr-val" id="o-mmr">${mmrVal}</div>
        </div>
        <div style="margin-left:10px;"><div class="brand-dot"></div></div>
      </div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render / Update ──
function render() {
  const root = document.getElementById('overlayRoot');
  if (!root) return;
  if (!rendered) {
    root.innerHTML = buildOverlay();
    rendered = true;
    document.getElementById('loadingState').style.display = 'none';
  } else {
    updateDOM();
  }
}

function updateDOM() {
  const { win, lose, mmr, mmrStart } = state;
  const winRate = wr(win, lose);
  const wrPct   = winRate;
  const wrCls   = wrClass(wrPct);
  const mmrVal  = mmr !== null ? mmr : '—';
  const delta   = (mmr !== null && mmrStart !== null) ? mmr - mmrStart : null;
  const deltaStr = delta === null ? '' : delta > 0 ? `+${delta}` : delta < 0 ? `${delta}` : '±0';
  const deltaCls = delta === null ? 'neu' : delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'neu';

  function setAndBump(id, val) {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.textContent !== String(val)) {
      el.textContent = val;
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }
  }

  setAndBump('o-win',  win);
  setAndBump('o-lose', lose);
  setAndBump('o-mmr',  mmrVal);

  // WR
  const wrEl = document.getElementById('o-wr');
  if (wrEl) {
    wrEl.textContent = `${wrPct}%`;
    wrEl.className = `wr-val ${wrCls}`;
    // Also in banner stat version
    const wrStatEl = document.getElementById('o-wr');
    if (wrStatEl) {
      wrStatEl.className = wrStatEl.className.replace(/\bwr-\w+\b/g, '').trim() + ' ' + wrCls;
    }
  }

  // WR bar
  const wrBar = document.getElementById('o-wrbar');
  if (wrBar) wrBar.style.width = `${wrPct}%`;

  // Delta badge
  const deltaEl = document.getElementById('o-delta');
  if (deltaEl && deltaStr) {
    const suffix = (size === 'widget') ? ' hari ini' : '';
    deltaEl.textContent = deltaStr + suffix;
    deltaEl.className = `mmr-badge ${deltaCls}`;
  }

  // Username
  const unEl = document.getElementById('o-username');
  if (unEl && unEl.textContent !== state.username) unEl.textContent = state.username;
}

// ── Firebase listeners ──
if (!UID) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display   = 'flex';
} else {
  // Profile (username)
  onValue(ref(db, `users/${UID}/profile`), snap => {
    if (!snap.exists()) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display   = 'flex';
      return;
    }
    const p = snap.val();
    state.username = p.username || '—';
    render();
  });

  // Daily data
  onValue(ref(db, `users/${UID}/daily`), snap => {
    const d = snap.val() || {};
    state.win  = d.win  || 0;
    state.lose = d.lose || 0;
    render();
  });

  // MMR current
  onValue(ref(db, `users/${UID}/mmr`), snap => {
    state.mmr = snap.val();
    render();
  });

  // MMR start of today (for delta)
  onValue(ref(db, `users/${UID}/history/${todayStr()}/mmr_start`), snap => {
    state.mmrStart = snap.val();
    render();
  });
}
</script>
</body>
</html>
